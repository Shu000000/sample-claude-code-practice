version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shift_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shift_management
      MYSQL_USER: shift_user
      MYSQL_PASSWORD: shift_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shift_backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: shift_user
      DB_PASSWORD: shift_password
      DB_NAME: shift_management
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shift_frontend
    environment:
      VITE_API_URL: http://localhost:8081
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
